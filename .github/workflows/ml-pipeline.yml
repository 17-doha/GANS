# .github/workflows/ml-pipeline.yml
name: ML Model CI

on:
    push:
        branches-ignore:
          - 'main'

jobs:
    validate-and-test:
        runs-on: ubuntu-latest
        steps:                
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.10'

            - name: Linter Check
              run: | 
               pip install flake8
               flake8 .

            - name: Model Dry Test
              run: |
               python -c "import torch; print('Model environment ready!')"

    train:
      runs-on: ubuntu-latest
      steps:                
            - name: Build Docker image
              run: docker build -t gans-app .
      
            - name: Run Docker container
              run: docker run gans-app
      
    
