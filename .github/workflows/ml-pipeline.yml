name: ML Model CI

on:
  push:
    branches-ignore:
      - 'main'

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:    
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: | 
          pip install flake8
          # We must install torch here so the next step doesn't crash!
          pip install --extra-index-url https://download.pytorch.org/whl/cpu torch

      - name: Linter Check
        run: | 
          # --exit-zero ensures formatting issues don't crash your whole pipeline
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Model Dry Test
        run: |
          python -c "import torch; print('Model environment ready!')"

  train:
    needs: validate-and-test
    runs-on: ubuntu-latest
    steps:       
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gans-app .
      
      - name: Run Docker container
        run: docker run gans-app