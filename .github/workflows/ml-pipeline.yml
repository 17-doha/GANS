name: Safe Health Promotion Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  validate:
    name: The Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Configure Real DVC Credentials
        run: |
          dvc remote modify origin --local access_key_id ${{ secrets.DAGSHUB_TOKEN }}
          dvc remote modify origin --local secret_access_key ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull Data
        run: dvc pull -r origin

      - name: Data Validation
        run: python app/check_data.py

      - name: Train and Log MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: 17-doha
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python -m app.main

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  build:
    name: The Build
    needs: validate
    runs-on: ubuntu-latest
    if: success() && ((github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[build-image]')) || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MLflow
        run: pip install mlflow

      - name: Download a Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Run Threshold Check
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: 17-doha
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python -m app.check_threshold

      - name: Docker Setup
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Build
        run: |
          RUN_ID=$(cat model_info.txt)
          docker build \
            --build-arg RUN_ID=$RUN_ID \
            --build-arg DAGSHUB_TOKEN=${{ secrets.DAGSHUB_TOKEN }} \
            -t ${{ secrets.DOCKER_USERNAME }}/safe-health-app:latest .

  deploy:
    name: The Promotion
    needs: build
    runs-on: ubuntu-latest
    if: success() && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Deploy Gate
        run: echo "Promoting ${{ github.ref_name }} to Clinic Production"
